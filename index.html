<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="浏览并阅读 docs 目录中的 Markdown 文档">
    <title>文档</title>
    <link rel="icon" href="./favicon.ico">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css">
    <link rel="stylesheet" href="./styles/common.css">
</head>
<body>
    <div class="container">
        <header class="site-header">
            <h1 id="page-title">文档</h1>
            <p id="page-subtitle" class="subtitle">浏览 docs 目录中的 Markdown 文档</p>
        </header>

        <main>
            <section id="document-list-view" class="card" aria-labelledby="document-list-title">
                <div id="document-list-title" class="card-title">文档列表</div>
                <p class="section-description">选择一篇文档开始阅读</p>
                <div id="document-list" class="document-list" aria-live="polite">
                    <div class="status-message">正在扫描文档...</div>
                </div>
            </section>

            <section id="document-reader-view" hidden>
                <nav class="reader-toolbar" aria-label="文档导航">
                    <a id="back-button" class="button button-secondary" href="./index.html">
                        <i data-lucide="arrow-left" aria-hidden="true"></i>
                        <span>返回文档列表</span>
                    </a>
                    <span id="document-path" class="document-path"></span>
                </nav>

                <article id="markdown-content" class="card markdown-body" aria-live="polite">
                    <div class="status-message">正在加载文档...</div>
                </article>
            </section>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/highlight.min.js"></script>
    <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
    <script src="./scripts/docs.js"></script>
</body>
</html>
